<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>山海事务管理局 | Mountain &amp; Sea Agency</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #7fb5dd;
            overflow: hidden;
        }

        body.modal-open {
            overflow: hidden;
        }

        img {
            display: block;
            max-width: 100%;
            user-select: none;
            -webkit-user-drag: none;
        }

        button,
        input {
            font: inherit;
        }

        .page {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: #7fb5dd;
        }

        .desktop-stage,
        .mobile-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .desktop-stage {
            background: #7fb5dd url("img/computer_bg.png") center center / cover no-repeat;
        }

        .desktop-character {
            position: absolute;
            left: clamp(6px, 1.4vw, 28px);
            top: 52%;
            height: clamp(500px, 73vh, 900px);
            width: auto;
            max-width: none;
            transform: translateY(-50%);
            transform-origin: center center;
            z-index: 3;
        }

        .desktop-panel {
            position: absolute;
            right: clamp(70px, 9vw, 210px);
            top: 41%;
            transform: translateY(-50%);
            width: clamp(450px, 38vw, 820px);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: clamp(22px, 3.4vh, 38px);
            z-index: 5;
        }

        .desktop-title {
            width: 112%;
            max-width: none;
            margin-left: -2%;
        }

        .desktop-cta,
        .mobile-cta {
            border: 0;
            background: transparent;
            padding: 0;
            margin: 0;
            cursor: pointer;
            transition: transform 0.18s ease;
        }

        .desktop-cta {
            width: 88%;
        }

        .desktop-cta:hover,
        .mobile-cta:hover {
            transform: translateY(-2px);
        }

        .desktop-cta:active,
        .mobile-cta:active {
            transform: translateY(0);
        }

        .desktop-cta:focus-visible,
        .mobile-cta:focus-visible {
            outline: 3px solid rgba(24, 60, 95, 0.45);
            outline-offset: 6px;
            border-radius: 999px;
        }

        .desktop-cta-inner,
        .mobile-cta-inner {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: visible;
        }

        .desktop-cta-icon,
        .mobile-cta-icon {
            position: relative;
            flex: 0 0 auto;
            width: auto;
            height: auto;
            max-width: none;
            z-index: 2;
            pointer-events: none;
        }

        .desktop-cta-icon {
            order: 1;
            width: 24%;
            margin-right: -8%;
        }

        .desktop-cta-bg {
            order: 2;
            width: 84%;
            flex: 0 0 auto;
            pointer-events: none;
        }

        .desktop-presented {
            position: fixed;
            right: clamp(16px, 2vw, 34px);
            bottom: clamp(10px, 1.8vh, 22px);
            width: clamp(180px, 14vw, 290px);
            max-width: none;
            z-index: 6;
        }

        .mobile-stage {
            display: none;
            background: #7fb5dd url("img/shanhai_mobile_bg_121_full12.png") center top / cover no-repeat;
        }

        .mobile-title {
            position: absolute;
            left: 50%;
            top: 18.8%;
            transform: translateX(-50%);
            width: 56.5%;
            max-width: none;
            z-index: 4;
        }

        .mobile-character {
            position: absolute;
            left: 50%;
            top: 40.2%;
            width: 47%;
            max-width: none;
            transform: translateX(-50%);
            z-index: 4;
        }

        .mobile-cta {
            position: absolute;
            left: 50%;
            top: 66.8%;
            transform: translateX(-50%);
            width: 89%;
            z-index: 5;
        }

        .mobile-cta:hover {
            transform: translateX(-50%) translateY(-2px);
        }

        .mobile-cta:active {
            transform: translateX(-50%);
        }

        .mobile-cta-icon {
            order: 1;
            width: 25%;
            margin-right: -9%;
        }

        .mobile-cta-bg {
            order: 2;
            width: 84%;
            flex: 0 0 auto;
            pointer-events: none;
        }

        .mobile-presented {
            position: absolute;
            right: 2.1%;
            bottom: 2.1%;
            width: 23.5%;
            max-width: none;
            z-index: 4;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Shared modal */
        .alpha-modal[hidden],
        .success-modal[hidden] {
            display: none;
        }

        .alpha-modal,
        .success-modal {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .alpha-backdrop,
        .success-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(10, 25, 40, 0.52);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .alpha-panel,
        .success-panel {
            position: relative;
            z-index: 1;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.78);
            box-shadow:
                0 24px 70px rgba(10, 24, 39, 0.24),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            text-align: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        .alpha-panel {
            width: min(92vw, 430px);
            padding: 28px 22px 22px;
        }

        .success-panel {
            width: min(92vw, 360px);
            padding: 28px 22px 22px;
        }

        .alpha-close,
        .success-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 40px;
            height: 40px;
            border: 0;
            border-radius: 999px;
            background: rgba(20, 45, 70, 0.08);
            color: #17314d;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            transition: background 0.18s ease, transform 0.18s ease;
        }

        .alpha-close:hover,
        .success-close:hover {
            background: rgba(20, 45, 70, 0.14);
            transform: scale(1.04);
        }

        .alpha-icon-wrap,
        .success-icon-wrap {
            width: 78px;
            height: 78px;
            margin: 4px auto 16px;
            border-radius: 24px;
            background: linear-gradient(180deg, rgba(247, 250, 255, 0.98), rgba(232, 239, 249, 0.95));
            display: grid;
            place-items: center;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 10px 28px rgba(16, 34, 55, 0.08);
        }

        .alpha-icon,
        .success-icon {
            font-size: 30px;
            line-height: 1;
        }

        .alpha-title,
        .success-title {
            margin: 0;
            color: #12253a;
            font-size: clamp(1.3rem, 2.6vw, 1.9rem);
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .alpha-text,
        .success-text {
            margin: 10px 0 0;
            color: #50657d;
            font-size: 0.98rem;
            line-height: 1.55;
        }

        .alpha-form {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .alpha-input {
            width: 100%;
            border: 1px solid rgba(32, 63, 94, 0.12);
            background: rgba(255, 255, 255, 0.92);
            color: #12253a;
            border-radius: 18px;
            padding: 15px 16px;
            outline: none;
            font-size: 16px;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
            box-shadow: inset 0 1px 2px rgba(16, 34, 55, 0.02);
        }

        .alpha-input::placeholder {
            color: #8a9aab;
        }

        .alpha-input:focus {
            border-color: rgba(36, 99, 235, 0.35);
            box-shadow: 0 0 0 4px rgba(36, 99, 235, 0.12);
        }

        .alpha-submit,
        .success-button {
            border: 0;
            border-radius: 18px;
            padding: 16px 18px;
            background: linear-gradient(180deg, #2f80ff 0%, #1d63e6 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(29, 99, 230, 0.26);
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        .alpha-submit:hover,
        .success-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 34px rgba(29, 99, 230, 0.3);
        }

        .alpha-submit:disabled {
            opacity: 0.72;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 8px 20px rgba(29, 99, 230, 0.18);
        }

        .alpha-message {
            min-height: 22px;
            margin: 2px 0 0;
            color: #245fd5;
            font-size: 14px;
            line-height: 1.45;
        }

        .alpha-note {
            margin: 0;
            color: #7a8898;
            font-size: 12.5px;
            line-height: 1.45;
        }

        .success-actions {
            margin-top: 20px;
        }

        @media (max-width: 820px) {
            .desktop-stage,
            .desktop-presented {
                display: none;
            }

            .mobile-stage {
                display: block;
            }

            .alpha-panel {
                width: min(92vw, 360px);
                padding: 24px 18px 18px;
                border-radius: 26px;
            }

            .success-panel {
                width: min(92vw, 330px);
                padding: 24px 18px 18px;
                border-radius: 26px;
            }

            .alpha-icon-wrap,
            .success-icon-wrap {
                width: 72px;
                height: 72px;
                border-radius: 22px;
            }
        }

        @media (max-width: 430px) {
            .mobile-title {
                width: 56.8%;
                top: 18.7%;
            }

            .mobile-character {
                width: 48.2%;
                left: 50%;
                top: 40.2%;
                transform: translateX(-50%);
            }

            .mobile-cta {
                width: 89.5%;
                top: 66.7%;
            }

            .mobile-cta-icon {
                width: 25.5%;
                margin-right: -9.5%;
            }

            .mobile-cta-bg {
                width: 84%;
            }

            .mobile-presented {
                width: 23.8%;
                right: 2%;
                bottom: 2%;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="desktop-stage" aria-label="Desktop layout">
            <img class="desktop-character" src="img/npc_cat_idle.gif" alt="仙鹤角色" />

            <div class="desktop-panel">
                <img class="desktop-title" src="img/title.png" alt="山海事务管理局 Mountain &amp; Sea Agency" />

                <button class="desktop-cta" id="desktopCta" type="button" aria-label="Get Alpha Access">
                    <span class="desktop-cta-inner">
                        <img class="desktop-cta-icon" src="img/fenghuang_web.gif" alt="" aria-hidden="true" />
                        <img class="desktop-cta-bg" src="img/getalpha_button.png" alt="" aria-hidden="true" />
                    </span>
                    <span class="sr-only">Get Alpha Access</span>
                </button>
            </div>

            <img class="desktop-presented" src="img/presentedby.png" alt="presented by PawFun" />
        </section>

        <section class="mobile-stage" aria-label="Mobile layout">
            <img class="mobile-title" src="img/title.png" alt="山海事务管理局 Mountain &amp; Sea Agency" />
            <img class="mobile-character" src="img/npc_cat_idle.gif" alt="仙鹤角色" />

            <button class="mobile-cta" id="mobileCta" type="button" aria-label="Get Alpha Access">
                <span class="mobile-cta-inner">
                    <img class="mobile-cta-icon" src="img/fenghuang_web.gif" alt="" aria-hidden="true" />
                    <img class="mobile-cta-bg" src="img/getalpha_button.png" alt="" aria-hidden="true" />
                </span>
                <span class="sr-only">Get Alpha Access</span>
            </button>

            <img class="mobile-presented" src="img/presentedby.png" alt="presented by PawFun" />
        </section>

        <!-- Email Modal -->
        <div class="alpha-modal" id="alphaModal" hidden>
            <div class="alpha-backdrop"></div>

            <div class="alpha-panel" role="dialog" aria-modal="true" aria-labelledby="alphaTitle">
                <button class="alpha-close" id="alphaClose" type="button" aria-label="Close">×</button>

                <div class="alpha-icon-wrap" aria-hidden="true">
                    <img class="alpha-icon" src="img/no_008.png" alt="图标" />
                </div>

                <h2 class="alpha-title" id="alphaTitle">Get Alpha Access</h2>
                <p class="alpha-text">Leave your email to begin a magical journey.</p>

                <form
                    id="alphaForm"
                    class="alpha-form"
                    action="https://docs.google.com/forms/d/e/1FAIpQLSegQdkkGsGYiipVcXXYbCAltDMiH5I3odgPdHGCEXvcDa9SSw/formResponse"
                    method="POST"
                    novalidate
                >
                    <input
                        class="alpha-input"
                        id="alphaEmail"
                        name="entry.1741503393"
                        type="email"
                        inputmode="email"
                        autocomplete="email"
                        placeholder="name@example.com"
                        required
                        maxlength="120"
                        aria-label="Email address"
                    />

                    <button class="alpha-submit" id="alphaSubmit" type="submit">
                        Pre-register Alpha Access
                    </button>

                    <p class="alpha-message" id="alphaMessage" aria-live="polite"></p>
                    <p class="alpha-note">We’ll only use your email for Alpha Access updates.</p>
                </form>
            </div>
        </div>

        <!-- Success Modal -->
        <div class="success-modal" id="successModal" hidden>
            <div class="success-backdrop"></div>

            <div class="success-panel" role="dialog" aria-modal="true" aria-labelledby="successTitle">
                <button class="success-close" id="successClose" type="button" aria-label="Close">×</button>

                <div class="success-icon-wrap" aria-hidden="true">
                    <div class="success-icon">✓</div>
                </div>

                <h2 class="success-title" id="successTitle">Success!</h2>
                <p class="success-text">You're on the list! We'll email you Alpha Access when the demo is ready.</p>

                <div class="success-actions">
                    <button class="success-button" id="successButton" type="button">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const alphaModal = document.getElementById("alphaModal");
        const successModal = document.getElementById("successModal");

        const alphaClose = document.getElementById("alphaClose");
        const successClose = document.getElementById("successClose");
        const successButton = document.getElementById("successButton");

        const desktopCta = document.getElementById("desktopCta");
        const mobileCta = document.getElementById("mobileCta");

        const alphaForm = document.getElementById("alphaForm");
        const alphaEmail = document.getElementById("alphaEmail");
        const alphaSubmit = document.getElementById("alphaSubmit");
        const alphaMessage = document.getElementById("alphaMessage");

        function openAlphaModal() {
            successModal.hidden = true;
            alphaModal.hidden = false;
            document.body.classList.add("modal-open");

            setTimeout(() => {
                alphaEmail.focus();
            }, 50);
        }

        function closeAlphaModal() {
            alphaModal.hidden = true;
            alphaMessage.textContent = "";
            alphaSubmit.disabled = false;
            alphaSubmit.textContent = "Pre-register Alpha Access";

            if (successModal.hidden) {
                document.body.classList.remove("modal-open");
            }
        }

        function openSuccessModal() {
            alphaModal.hidden = true;
            successModal.hidden = false;
            document.body.classList.add("modal-open");

            setTimeout(() => {
                successButton.focus();
            }, 50);
        }

        function closeSuccessModal() {
            successModal.hidden = true;
            document.body.classList.remove("modal-open");
        }

        desktopCta.addEventListener("click", openAlphaModal);
        mobileCta.addEventListener("click", openAlphaModal);

        alphaClose.addEventListener("click", closeAlphaModal);
        successClose.addEventListener("click", closeSuccessModal);
        successButton.addEventListener("click", closeSuccessModal);

        alphaModal.addEventListener("click", function (event) {
            if (event.target === alphaModal || event.target.classList.contains("alpha-backdrop")) {
                closeAlphaModal();
            }
        });

        successModal.addEventListener("click", function (event) {
            if (event.target === successModal || event.target.classList.contains("success-backdrop")) {
                closeSuccessModal();
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape") {
                if (!successModal.hidden) {
                    closeSuccessModal();
                } else if (!alphaModal.hidden) {
                    closeAlphaModal();
                }
            }
        });

        alphaForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            if (!alphaEmail.checkValidity()) {
                alphaEmail.reportValidity();
                return;
            }

            alphaSubmit.disabled = true;
            alphaSubmit.textContent = "Submitting...";
            alphaMessage.textContent = "";

            try {
                const formData = new FormData(alphaForm);

                await fetch(alphaForm.action, {
                    method: "POST",
                    mode: "no-cors",
                    body: formData
                });

                alphaForm.reset();
                alphaSubmit.textContent = "Pre-register Alpha Access";
                alphaSubmit.disabled = false;

                openSuccessModal();
            } catch (error) {
                alphaMessage.textContent = "Something went wrong. Please try again.";
                alphaSubmit.textContent = "Pre-register Alpha Access";
                alphaSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
