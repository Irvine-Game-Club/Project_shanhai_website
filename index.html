<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>山海事务管理局 | Mountain &amp; Sea Agency</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #7fb5dd;
            overflow: hidden;
        }

        body.modal-open {
            overflow: hidden;
        }

        img {
            display: block;
            max-width: 100%;
            user-select: none;
            -webkit-user-drag: none;
        }

        button {
            font: inherit;
        }

        .page {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: #7fb5dd;
        }

        .desktop-stage,
        .mobile-stage {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .desktop-stage {
            background: #7fb5dd url("img/computer_bg.png") center center / cover no-repeat;
        }

        .desktop-character {
            position: absolute;
            left: clamp(6px, 1.4vw, 28px);
            top: 52%;
            height: clamp(500px, 73vh, 900px);
            width: auto;
            max-width: none;
            transform: translateY(-50%) scaleX(-1);
            transform-origin: center center;
            z-index: 3;
        }

        .desktop-panel {
            position: absolute;
            right: clamp(70px, 9vw, 210px);
            top: 41%;
            transform: translateY(-50%);
            width: clamp(450px, 38vw, 820px);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: clamp(22px, 3.4vh, 38px);
            z-index: 5;
        }

        .desktop-title {
            width: 112%;
            max-width: none;
            margin-left: -2%;
        }

        .desktop-cta,
        .mobile-cta {
            border: 0;
            background: transparent;
            padding: 0;
            margin: 0;
            cursor: pointer;
            transition: transform 0.18s ease;
        }

        .desktop-cta {
            width: 88%;
        }

        .desktop-cta:hover,
        .mobile-cta:hover {
            transform: translateY(-2px);
        }

        .desktop-cta:active,
        .mobile-cta:active {
            transform: translateY(0);
        }

        .desktop-cta:focus-visible,
        .mobile-cta:focus-visible {
            outline: 3px solid rgba(24, 60, 95, 0.45);
            outline-offset: 6px;
            border-radius: 999px;
        }

        .desktop-cta-inner,
        .mobile-cta-inner {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            overflow: visible;
        }

        .desktop-cta-icon,
        .mobile-cta-icon {
            position: relative;
            flex: 0 0 auto;
            width: auto;
            height: auto;
            max-width: none;
            z-index: 2;
            pointer-events: none;
        }

        .desktop-cta-icon {
            order: 1;
            width: 24%;
            margin-right: -8%;
        }

        .desktop-cta-bg {
            order: 2;
            width: 84%;
            flex: 0 0 auto;
            pointer-events: none;
        }

        .desktop-presented {
            position: fixed;
            right: clamp(16px, 2vw, 34px);
            bottom: clamp(10px, 1.8vh, 22px);
            width: clamp(180px, 14vw, 290px);
            max-width: none;
            z-index: 6;
        }

        .mobile-stage {
            display: none;
            background: #7fb5dd url("img/shanhai_mobile_bg_121_full12.png") center top / cover no-repeat;
        }

        .mobile-title {
            position: absolute;
            left: 50%;
            top: 18.8%;
            transform: translateX(-50%);
            width: 56.5%;
            max-width: none;
            z-index: 4;
        }

        .mobile-character {
            position: absolute;
            right: -0.8%;
            top: 40.2%;
            width: 47%;
            max-width: none;
            z-index: 4;
        }

        .mobile-cta {
            position: absolute;
            left: 50%;
            top: 66.8%;
            transform: translateX(-50%);
            width: 89%;
            z-index: 5;
        }

        .mobile-cta:hover {
            transform: translateX(-50%) translateY(-2px);
        }

        .mobile-cta:active {
            transform: translateX(-50%);
        }

        .mobile-cta-icon {
            order: 1;
            width: 25%;
            margin-right: -9%;
        }

        .mobile-cta-bg {
            order: 2;
            width: 84%;
            flex: 0 0 auto;
            pointer-events: none;
        }

        .mobile-presented {
            position: absolute;
            right: 2.1%;
            bottom: 2.1%;
            width: 23.5%;
            max-width: none;
            z-index: 4;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .qr-modal[hidden] {
            display: none;
        }

        .qr-modal {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .qr-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(10, 25, 40, 0.58);
            backdrop-filter: blur(8px);
        }

        .qr-panel {
            position: relative;
            z-index: 1;
            width: min(92vw, 420px);
            padding: 26px 22px 20px;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 24px 70px rgba(10, 24, 39, 0.28);
            text-align: center;
        }

        .qr-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            border: 0;
            border-radius: 999px;
            background: rgba(20, 45, 70, 0.08);
            color: #17314d;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
        }

        .qr-close:hover {
            background: rgba(20, 45, 70, 0.14);
        }

        .qr-code {
            width: min(72vw, 260px);
            margin: 16px auto 14px;
            border-radius: 18px;
            background: #fff;
            box-shadow: 0 12px 30px rgba(16, 34, 55, 0.1);
        }

        .qr-title {
            margin: 0;
            color: #12253a;
            font-size: clamp(1.15rem, 2.4vw, 1.55rem);
            font-weight: 700;
        }

        .qr-text {
            margin: 8px 0 0;
            color: #3c546d;
            font-size: 0.98rem;
            line-height: 1.5;
        }

        @media (max-width: 820px) {
            .desktop-stage,
            .desktop-presented {
                display: none;
            }

            .mobile-stage {
                display: block;
            }

            .qr-panel {
                width: min(92vw, 360px);
                padding: 24px 18px 18px;
                border-radius: 24px;
            }

            .qr-code {
                width: min(74vw, 240px);
            }
        }

        @media (max-width: 430px) {
            .mobile-title {
                width: 56.8%;
                top: 18.7%;
            }

            .mobile-character {
                width: 48.2%;
                right: -1.5%;
                top: 40.2%;
            }

            .mobile-cta {
                width: 89.5%;
                top: 66.7%;
            }

            .mobile-cta-icon {
                width: 25.5%;
                margin-right: -9.5%;
            }

            .mobile-cta-bg {
                width: 84%;
            }

            .mobile-presented {
                width: 23.8%;
                right: 2%;
                bottom: 2%;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <section class="desktop-stage" aria-label="Desktop layout">
            <img class="desktop-character" src="img/xianhe_web.gif" alt="仙鹤角色" />

            <div class="desktop-panel">
                <img class="desktop-title" src="img/title.png" alt="山海事务管理局 Mountain &amp; Sea Agency" />

                <button class="desktop-cta" id="desktopCta" type="button" aria-label="Get Alpha Access">
                    <span class="desktop-cta-inner">
                        <img class="desktop-cta-icon" src="img/fenghuang_web.gif" alt="" aria-hidden="true" />
                        <img class="desktop-cta-bg" src="img/getalpha_button.png" alt="" aria-hidden="true" />
                    </span>
                    <span class="sr-only">Get Alpha Access</span>
                </button>
            </div>

            <img class="desktop-presented" src="img/presentedby.png" alt="presented by PawFun" />
        </section>

        <section class="mobile-stage" aria-label="Mobile layout">
            <img class="mobile-title" src="img/title.png" alt="山海事务管理局 Mountain &amp; Sea Agency" />
            <img class="mobile-character" src="img/xianhe_web.gif" alt="仙鹤角色" />

            <button class="mobile-cta" id="mobileCta" type="button" aria-label="Get Alpha Access">
                <span class="mobile-cta-inner">
                    <img class="mobile-cta-icon" src="img/fenghuang_web.gif" alt="" aria-hidden="true" />
                    <img class="mobile-cta-bg" src="img/getalpha_button.png" alt="" aria-hidden="true" />
                </span>
                <span class="sr-only">Get Alpha Access</span>
            </button>

            <img class="mobile-presented" src="img/presentedby.png" alt="presented by PawFun" />
        </section>

        <div class="qr-modal" id="qrModal" hidden>
            <div class="qr-backdrop"></div>
            <div class="qr-panel" role="dialog" aria-modal="true" aria-labelledby="qrTitle">
                <button class="qr-close" id="qrClose" type="button" aria-label="Close">×</button>
                <img class="qr-code" src="img/game_website_qr_code.gif" alt="Alpha Access QR Code" />
                <h2 class="qr-title" id="qrTitle">Get Alpha Access</h2>
                <p class="qr-text">请扫码加入 Alpha Access。</p>
            </div>
        </div>
    </div>

    <script>
        const qrModal = document.getElementById("qrModal");
        const qrClose = document.getElementById("qrClose");
        const desktopCta = document.getElementById("desktopCta");
        const mobileCta = document.getElementById("mobileCta");

        function openQrModal() {
            qrModal.hidden = false;
            document.body.classList.add("modal-open");
        }

        function closeQrModal() {
            qrModal.hidden = true;
            document.body.classList.remove("modal-open");
        }

        desktopCta.addEventListener("click", openQrModal);
        mobileCta.addEventListener("click", openQrModal);
        qrClose.addEventListener("click", closeQrModal);

        qrModal.addEventListener("click", function (event) {
            if (event.target === qrModal || event.target.classList.contains("qr-backdrop")) {
                closeQrModal();
            }
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "Escape" && !qrModal.hidden) {
                closeQrModal();
            }
        });
    </script>
</body>
</html>
